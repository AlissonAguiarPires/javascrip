<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
    <style>
        body{
            background-color: lightgray;
            font-family: Arial, Helvetica, sans-serif;
        }
        header{
            padding: 20px;
            margin: 30px;
            background-color: gray;
        }
        p{
            font-size: 1.2em;
            text-align: center;
        }
        h1{
            text-align: center;
            
        }
        script{
            font: normal 20pt Arial;
        }
    </style>
</head>
<body>
    <header><h1>Novos comandos</h1>
    <p>Caracteristicas do seu nome</p>
    </header>
    <script>
        var nome = window.prompt('Qual seu nome')
        document.write(`Seu nome tem ${nome.length} letras.`)   
        document.write(`Seu nome em maiúsculas é ${nome.toUpperCase()}`)
        document.write(`Seu nome em minúsculas é ${nome.toLowerCase()}`)
    </script>
</body>
</html>

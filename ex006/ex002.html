    <title>Seu pais</title>
</head>
<body>
    <h1>Nacionalidade</h1>
    <input type="text" id="pais">
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="res"></div>
    <script>
        function verificar(){
            
            var p = document.querySelector('input#pais').value
            var res =document.querySelector('div#res')
            if (p == 'EUA'){
                res.innerHTML = 'Vc é Americano'
            }else{
                res.innerHTML = 'Vc é estrangeiro'
            }
    
                }
